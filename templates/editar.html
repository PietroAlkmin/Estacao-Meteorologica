{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 600px;">
    <h2 class="mb-4">Editar Leitura #{{ leitura.id }}</h2>

    <div class="card shadow-sm">
        <div class="card-body">
            <!-- Enviando como POST por compatibilidade HTML, mas o backend vai processar a alteração -->
            <form action="/leituras/{{ leitura.id }}/atualizar" method="POST">
                <div class="mb-3">
                    <label for="temperatura" class="form-label">Temperatura (°C)</label>
                    <input type="number" step="0.1" class="form-control" id="temperatura" name="temperatura" value="{{ leitura.temperatura }}" required>
                </div>
                <div class="mb-3">
                    <label for="umidade" class="form-label">Umidade (%)</label>
                    <input type="number" step="0.1" class="form-control" id="umidade" name="umidade" value="{{ leitura.umidade }}" required>
                </div>
                <div class="mb-3">
                    <label for="pressao" class="form-label">Pressão Atmosférica (hPa) - Opcional</label>
                    <input type="number" step="0.1" class="form-control" id="pressao" name="pressao" value="{{ leitura.pressao or '' }}">
                </div>
                <div class="mb-3">
                    <label for="localizacao" class="form-label">Localização</label>
                    <input type="text" class="form-control" id="localizacao" name="localizacao" value="{{ leitura.localizacao }}">
                </div>
                
                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="/leituras" class="btn btn-outline-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-success">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
